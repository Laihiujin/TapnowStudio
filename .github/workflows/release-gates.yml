name: Release Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      TAPNOW_SMOKE_BROWSER: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build

      - name: Run release gate tests
        run: npm run test:release:gates

      - name: Run smoke test with Playwright fallback
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/smoke_test.ps1 -UsePlaywrightFallback
